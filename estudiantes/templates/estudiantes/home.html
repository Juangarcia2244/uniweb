<!DOCTYPE html>
<html>
<head>
    <title>Gestión de Productos</title>
<style>

body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.header {
    background: #f5ca91;
    padding: 20px;
    text-align: center;
}

.contenido {
    flex: 1;
    margin-top: 50px;
    text-align: center;
}

.botones {
    margin-top: 30px;
}

.boton {
    display: inline-block;
    background: #f5ca91;
    padding: 15px 30px;
    font-size: 16px;
    border-radius: 8px;
    text-decoration: none;
    color: black;
    margin: 10px;
}

.boton:hover {
    background: #eeae65;
}

.footer {
    background: #f5ca91;
    border-top: 4px solid #d4922a;
    padding: 15px;
    text-align: center;
}

</style>
</head>
<body>

<div class="header">
    <h2>Gestión de Productos</h2>
    <p>Ximena - Juan Esteban</p>
</div>

<div class="contenido">
    <h3>Bienvenidos al sistema de gestión de productos</h3>

    <div class="botones">
        <a href="{% url 'registrar_producto' %}" class="boton">
            Registrar Productos
        </a>

        <a href="{% url 'lista_productos' %}" class="boton">
            Lista de Productos
        </a>
    </div>
</div>

<div class="footer">
    <p>Programación web</p>
    <p>UNIMINUTO</p>
</div>

</body>
</html>
