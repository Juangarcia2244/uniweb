<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Editar producto</title>
<style>

body {
    font-family: Arial;
    margin: 0;
    background: #f1e3c5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.header {
    background: #f5ca91;
    padding: 20px;
    text-align: left;
}

.contenido {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

.form-card {
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 400px;
    text-align: center;
}

.form-card input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

.btn {
    width: 100%;
    background: #4e9dee;
    border: none;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    color: white;
}

.btn:hover {
    background: #2e7ecf;
}

.boton {
    display: block;
    text-align: center;
    margin: 15px auto 0;
    width: 230px;
    background: #f5ca91;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    color: black;
}

.boton:hover {
    background: #eeae65;
}

.footer {
    background: #f5ca91;
    border-top: 4px solid #d4922a;
    padding: 12px;
    text-align: center;
    font-size: 14px;
}

</style>
</head>
<body>

    <div class="header">
        <h1>Editar Producto</h1>
    </div>

    <div class="contenido">
        <div>
            <form method="post" class="form-card">
                {% csrf_token %}

                {% if error %}
                    <p style="color:red; font-weight:bold; margin-bottom:15px;">
                        {{ error }}
                    </p>
                {% endif %}

                <label>Nombre:</label>
                <input type="text" name="nombre" value="{{ producto.nombre }}" required>

                <label>Precio:</label>
                <input type="number" name="precio" step="0.01" min="0.01"
                       value="{{ producto.precio }}" required>

                <br><br>
                <button class="btn" type="submit">Guardar cambios</button>
            </form>

            <a href="{% url 'lista_productos' %}" class="boton">
                Cancelar
            </a>
        </div>
    </div>

    <div class="footer">
        <p>Programación web &mdash; UNIMINUTO</p>
    </div>

</body>
</html>
